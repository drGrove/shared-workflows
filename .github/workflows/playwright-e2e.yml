name: Playwright E2E

on:
  workflow_call:
    inputs:
      postgres-db:
        description: "PostgreSQL database name (empty to skip postgres)"
        type: string
        default: ""
      e2e-directory:
        description: "Directory containing E2E tests"
        type: string
        default: "e2e"
      e2e-env:
        description: "JSON object of environment variables for E2E tests"
        type: string
        default: "{}"
      node-version:
        description: "Node.js version"
        type: string
        default: "18"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Postgres
        if: ${{ inputs.postgres-db != '' }}
        uses: drGrove/shared-workflows/actions/start-postgres@main
        with:
          db-name: ${{ inputs.postgres-db }}

      - uses: drGrove/shared-workflows/actions/setup-playwright@main
        with:
          directory: ${{ inputs.e2e-directory }}
          node-version: ${{ inputs.node-version }}

      - name: Set environment variables
        if: ${{ inputs.e2e-env != '{}' }}
        run: |
          echo '${{ inputs.e2e-env }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Set DATABASE_URL
        if: ${{ inputs.postgres-db != '' }}
        run: |
          echo "DATABASE_URL=postgres://postgres:postgres@localhost:5432/${{ inputs.postgres-db }}" >> "$GITHUB_ENV"

      - name: Run E2E tests
        working-directory: ${{ inputs.e2e-directory }}
        run: npm test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            ${{ inputs.e2e-directory }}/playwright-report/
            ${{ inputs.e2e-directory }}/blob-report/
          retention-days: 14
