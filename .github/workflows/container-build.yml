name: Container Build

on:
  workflow_call:
    inputs:
      containerfile:
        description: "Path to the Containerfile/Dockerfile"
        type: string
        default: "Containerfile"
      image-name:
        description: "Full image name including registry (e.g., ghcr.io/owner/repo)"
        type: string
        required: true
      push:
        description: "Push the built image to the registry"
        type: boolean
        default: false
      attest:
        description: "Generate SLSA Build L3 attestation"
        type: boolean
        default: true

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

jobs:
  build:
    name: Build container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.containerfile }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate SLSA attestation
        if: ${{ inputs.push && inputs.attest }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ inputs.image-name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
