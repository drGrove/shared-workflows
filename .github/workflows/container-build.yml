name: Container Build

on:
  workflow_call:
    inputs:
      containerfile:
        description: "Path to the Containerfile/Dockerfile"
        type: string
        default: "Containerfile"
      image-name:
        description: "Full image name including registry (e.g., ghcr.io/owner/repo)"
        type: string
        required: true
      platforms:
        description: "Comma-separated build platforms"
        type: string
        default: "linux/amd64,linux/arm64"
      push:
        description: "Push the built image to the registry"
        type: boolean
        default: false
      provenance:
        description: "Embed BuildKit SLSA provenance (mode=max) in the image"
        type: boolean
        default: true
      sbom:
        description: "Embed an SBOM in the image"
        type: boolean
        default: true
      attest:
        description: "Generate a signed SLSA build provenance attestation (GitHub store)"
        type: boolean
        default: true
    outputs:
      image-digest:
        description: "Digest of the built multi-arch image index"
        value: ${{ jobs.build.outputs.digest }}

jobs:
  # The build job runs the consumer's Containerfile (user-defined build steps).
  # It is granted ONLY contents:read -- no id-token/attestations (so build steps
  # can't mint an OIDC token and forge provenance) and no packages (so they can't
  # push). Signing and publishing happen in the isolated publish job below.
  build:
    name: Build container
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Compute SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "${GITHUB_ENV}"

      - name: Build image to OCI archive
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.containerfile }}
          platforms: ${{ inputs.platforms }}
          push: false
          outputs: type=oci,dest=/tmp/image.tar,rewrite-timestamp=true
          provenance: ${{ inputs.provenance && 'mode=max' || 'false' }}
          sbom: ${{ inputs.sbom }}
          labels: ${{ steps.meta.outputs.labels }}
        env:
          SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}

      - name: Save image tags
        run: |
          cat <<'EOF' > /tmp/image-tags.txt
          ${{ steps.meta.outputs.tags }}
          EOF

      - name: Derive image digest
        id: digest
        run: |
          digest=$(tar -xOf /tmp/image.tar index.json | jq -r '.manifests[0].digest')
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: |
            /tmp/image.tar
            /tmp/image-tags.txt
          retention-days: 1

  # The publish job runs only fixed, repo-controlled steps (no consumer build
  # steps), so the OIDC/signing material it holds is isolated from user-defined
  # build steps -- this is what satisfies the SLSA L3 "provenance unforgeable"
  # requirement. It also holds the registry push credentials.
  publish:
    name: Publish container
    needs: build
    if: ${{ inputs.push }}
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: container-image
          path: /tmp

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Derive image digest
        id: digest
        run: |
          digest=$(tar -xOf /tmp/image.tar index.json | jq -r '.manifests[0].digest')
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"

      - name: Push image to registry
        run: |
          first_tag=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Pushing ${tag}"
            skopeo copy --all --preserve-digests \
              "oci-archive:/tmp/image.tar" "docker://${tag}"
            [ -z "$first_tag" ] && first_tag="$tag"
          done < /tmp/image-tags.txt
          echo "first_tag=${first_tag}" >> "${GITHUB_ENV}"

      - name: Verify pushed digest matches build digest
        run: |
          pushed=$(skopeo inspect --format '{{.Digest}}' "docker://${first_tag}")
          expected="${{ steps.digest.outputs.digest }}"
          echo "pushed=${pushed}"
          echo "expected=${expected}"
          if [ "$pushed" != "$expected" ]; then
            echo "Pushed digest does not match build digest!" >&2
            exit 1
          fi

      - name: Generate signed SLSA attestation
        if: ${{ inputs.attest }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ inputs.image-name }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: false
